<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Batch - FunFit</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="nav-container">
        <a href="index.html" class="logo">Fun<span>Fit</span></a>
        <nav>
            <a href="index.html">🏠 Home</a>
            <a href="jsp/listBatches.jsp">📋 Batches</a>
            <a href="jsp/listParticipants.jsp">👥 Participants</a>
            <a href="add-batch.html">➕ Add Batch</a>
            <a href="add-participant.html">➕ Add Participant</a>
        </nav>
    </div>
</header>

<main>
    <div class="page-container">
        <div class="breadcrumb">
            <a href="index.html">Home</a> &rsaquo; <a href="jsp/listBatches.jsp">Batches</a> &rsaquo; Update Batch
        </div>

        <h1 class="page-title">✏️ Update Batch</h1>

        <div class="form-card">
            <form action="BatchController" method="post">
                <!-- Hidden action flag for update -->
                <input type="hidden" name="action" value="update">

                <div class="form-group">
                    <label for="bid">Batch ID</label>
                    <input type="number" id="bid" name="bid"
                           placeholder="Enter Batch ID to update" min="1" required>
                    <small style="color:#888; font-size:12px; margin-top:4px; display:block;">
                        💡 <a href="jsp/listBatches.jsp" style="color:#e94560;">View all batches</a> to find the correct Batch ID.
                    </small>
                </div>

                <div class="form-group">
                    <label for="name">New Batch Name</label>
                    <input type="text" id="name" name="name"
                           placeholder="e.g. Zumba Advanced B" required>
                </div>

                <div class="form-group">
                    <label for="slot">Time Slot</label>
                    <select id="slot" name="slot" required>
                        <option value="" disabled selected>Select a slot</option>
                        <option value="Morning">🌅 Morning</option>
                        <option value="Evening">🌆 Evening</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="time">Class Time</label>
                    <input type="text" id="time" name="time"
                           placeholder="e.g. 06:00 AM - 07:00 AM" required>
                </div>

                <div style="display:flex; gap:15px; margin-top:10px;">
                    <button type="submit" class="btn btn-primary">🔄 Update Batch</button>
                    <a href="jsp/listBatches.jsp" class="btn btn-secondary">✕ Cancel</a>
                </div>
            </form>
        </div>
    </div>
</main>

<footer>
    <p>© 2024 FunFit — Zumba Management System</p>
</footer>

</body>
</html>
