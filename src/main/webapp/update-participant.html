<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Participant - FunFit</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="nav-container">
        <a href="index.html" class="logo">Fun<span>Fit</span></a>
        <nav>
            <a href="index.html">🏠 Home</a>
            <a href="jsp/listBatches.jsp">📋 Batches</a>
            <a href="jsp/listParticipants.jsp">👥 Participants</a>
            <a href="add-batch.html">➕ Add Batch</a>
            <a href="add-participant.html">➕ Add Participant</a>
        </nav>
    </div>
</header>

<main>
    <div class="page-container">
        <div class="breadcrumb">
            <a href="index.html">Home</a> &rsaquo; <a href="jsp/listParticipants.jsp">Participants</a> &rsaquo; Update Participant
        </div>

        <h1 class="page-title">🔄 Update Participant</h1>

        <div class="form-card">
            <form action="ParticipantController" method="post">
                <!-- Hidden action flag for update -->
                <input type="hidden" name="action" value="update">

                <div class="form-group">
                    <label for="pid">Participant ID</label>
                    <input type="number" id="pid" name="pid"
                           placeholder="Enter Participant ID to update" min="1" required>
                    <small style="color:#888; font-size:12px; margin-top:4px; display:block;">
                        💡 <a href="jsp/listParticipants.jsp" style="color:#e94560;">View all participants</a> to find the correct ID.
                    </small>
                </div>

                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name"
                           placeholder="e.g. Jane Doe" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="text" id="phone" name="phone"
                           placeholder="e.g. +91 88888 22222" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email"
                           placeholder="e.g. jane@example.com" required>
                </div>

                <div class="form-group">
                    <label for="bid">Batch ID</label>
                    <input type="number" id="bid" name="bid"
                           placeholder="Enter new Batch ID" min="1" required>
                </div>

                <div style="display:flex; gap:15px; margin-top:10px;">
                    <button type="submit" class="btn btn-primary">🔄 Update Participant</button>
                    <a href="jsp/listParticipants.jsp" class="btn btn-secondary">✕ Cancel</a>
                </div>
            </form>
        </div>
    </div>
</main>

<footer>
    <p>© 2024 FunFit — Zumba Management System</p>
</footer>

</body>
</html>
